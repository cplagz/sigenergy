# sigenergy_pvoutput.yaml
#
# INSTALLATION
# 1. Add this to configuration.yaml (once only, skip if already done):
#      homeassistant:
#        packages: !include_dir_named packages
#
# 2. Place this file at /config/packages/sigenergy_pvoutput.yaml
#
# 3. Add these two lines to /config/secrets.yaml:
#      pvoutput_api_key: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
#      pvoutput_system_id: "123456"
#    Get your values from: https://pvoutput.org/account.jsp
#
# 4. Check Config > Restart HA, then enable the automation in the UI.
#
# PVOUTPUT SYSTEM SETTINGS (Settings > System > Extended Data)
# Configure these labels and units on the PVOutput website before use.
# Donation Mode required for v7-v12:
#
#   Field  Label              Unit   Axis   Graph
#   v7     Battery SOC        %      Right  Line
#   v8     Battery Power      W      Left   Line   (+ charge / - discharge)
#   v9     Grid Import        W      Left   Bar
#   v10    Grid Export        W      Left   Bar
#   v11    Battery Temp       C      Right  Line
#   v12    Inverter Temp      C      Right  Line
#
# FULL SENSOR MAP
#   v1  = PV Energy today (Wh)      <- sigen_plant_daily_pv_energy
#   v2  = PV Power now (W)          <- sigen_plant_pv_power
#   v3  = Load Energy today (Wh)    <- sigen_plant_daily_load_consumption
#   v4  = Load Power now (W)        <- sigen_plant_consumed_power
#   v7  = Battery SOC (%)           <- sigen_plant_battery_state_of_charge
#   v8  = Battery Power (W)         <- sigen_plant_battery_power
#   v9  = Grid Import Power (W)     <- sigen_plant_grid_import_power
#   v10 = Grid Export Power (W)     <- sigen_plant_grid_export_power
#   v11 = Battery Temperature (C)   <- sigen_inverter_battery_average_cell_temperature
#   v12 = Inverter Temperature (C)  <- sigen_inverter_pcs_internal_temperature

template:
  - sensor:
      - name: "PVOutput PV Energy Today Wh"
        unique_id: pvoutput_pv_energy_today_wh
        unit_of_measurement: "Wh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:solar-power-variant
        state: >
          {{ (states('sensor.sigen_plant_daily_pv_energy') | float(0) * 1000) | round(0) | int }}

      - name: "PVOutput PV Power W"
        unique_id: pvoutput_pv_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-power
        state: >
          {{ (states('sensor.sigen_plant_pv_power') | float(0) * 1000) | round(0) | int }}

      - name: "PVOutput Load Energy Today Wh"
        unique_id: pvoutput_load_energy_today_wh
        unit_of_measurement: "Wh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:home-lightning-bolt-outline
        state: >
          {{ (states('sensor.sigen_plant_daily_load_consumption') | float(0) * 1000) | round(0) | int }}

      - name: "PVOutput Load Power W"
        unique_id: pvoutput_load_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:home-lightning-bolt
        state: >
          {{ (states('sensor.sigen_plant_consumed_power') | float(0) * 1000) | round(0) | int }}

      - name: "PVOutput Battery SOC"
        unique_id: pvoutput_battery_soc
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        icon: mdi:battery-charging-80
        state: >
          {{ states('sensor.sigen_plant_battery_state_of_charge') | float(0) | round(1) }}

      - name: "PVOutput Battery Power W"
        unique_id: pvoutput_battery_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging-100
        state: >
          {{ (states('sensor.sigen_plant_battery_power') | float(0) * 1000) | round(0) | int }}

      - name: "PVOutput Grid Import Power W"
        unique_id: pvoutput_grid_import_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower-export
        state: >
          {{ (states('sensor.sigen_plant_grid_import_power') | float(0) * 1000) | round(0) | int }}

      - name: "PVOutput Grid Export Power W"
        unique_id: pvoutput_grid_export_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower-import
        state: >
          {{ (states('sensor.sigen_plant_grid_export_power') | float(0) * 1000) | round(0) | int }}

      - name: "PVOutput Battery Temperature C"
        unique_id: pvoutput_battery_temperature_c
        unit_of_measurement: "C"
        device_class: temperature
        state_class: measurement
        icon: mdi:thermometer
        state: >
          {{ states('sensor.sigen_inverter_battery_average_cell_temperature') | float(0) | round(1) }}

      - name: "PVOutput Inverter Temperature C"
        unique_id: pvoutput_inverter_temperature_c
        unit_of_measurement: "C"
        device_class: temperature
        state_class: measurement
        icon: mdi:thermometer
        state: >
          {{ states('sensor.sigen_inverter_pcs_internal_temperature') | float(0) | round(1) }}

rest_command:
  pvoutput_add_status:
    url: "https://pvoutput.org/service/r2/addstatus.jsp"
    method: POST
    headers:
      X-Pvoutput-Apikey: !secret pvoutput_api_key
      X-Pvoutput-SystemId: !secret pvoutput_system_id
    payload: "d={{ now().strftime('%Y%m%d') }}&t={{ now().strftime('%H:%M') }}&v1={{ states('sensor.pvoutput_pv_energy_today_wh') }}&v2={{ states('sensor.pvoutput_pv_power_w') }}&v3={{ states('sensor.pvoutput_load_energy_today_wh') }}&v4={{ states('sensor.pvoutput_load_power_w') }}&v7={{ states('sensor.pvoutput_battery_soc') }}&v8={{ states('sensor.pvoutput_battery_power_w') }}&v9={{ states('sensor.pvoutput_grid_import_power_w') }}&v10={{ states('sensor.pvoutput_grid_export_power_w') }}&v11={{ states('sensor.pvoutput_battery_temperature_c') }}&v12={{ states('sensor.pvoutput_inverter_temperature_c') }}"
    content_type: "application/x-www-form-urlencoded"

automation:
  - alias: "Update Sigenergy to PVOutput"
    id: update_sigenergy_to_pvoutput_pkg
    description: "Pushes Sigenergy solar, battery, and grid data to PVOutput every 5 minutes."
    mode: single

    trigger:
      - platform: time_pattern
        minutes: "/5"

    condition:
      - condition: time
        after: "05:30:00"
        before: "20:30:00"

      - condition: state
        entity_id: sensor.sigen_plant_plant_running_state
        state: "Running"

      - condition: template
        value_template: >
          {{ states('sensor.pvoutput_pv_energy_today_wh') not in ['unknown', 'unavailable', 'none']
          and states('sensor.pvoutput_pv_power_w') not in ['unknown', 'unavailable', 'none'] }}

    action:
      - service: rest_command.pvoutput_add_status
        response_variable: pvoutput_response

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ pvoutput_response.status == 200 }}"
            sequence:
              - service: system_log.write
                data:
                  message: "PVOutput OK | PV: {{ states('sensor.pvoutput_pv_power_w') }}W | Load: {{ states('sensor.pvoutput_load_power_w') }}W | Batt: {{ states('sensor.pvoutput_battery_soc') }}% {{ states('sensor.pvoutput_battery_power_w') }}W | Grid in: {{ states('sensor.pvoutput_grid_import_power_w') }}W out: {{ states('sensor.pvoutput_grid_export_power_w') }}W"
                  level: debug
        default:
          - service: system_log.write
            data:
              message: "PVOutput push FAILED | HTTP {{ pvoutput_response.status }} | {{ pvoutput_response.content }}"
              level: warning
